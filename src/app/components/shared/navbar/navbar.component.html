<header class="cl-topbar">

  <div class="cl-topbar__brand">
    <svg class="cl-topbar__logo" width="28" height="28" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="#00478D"/>
      <path d="M16 7v18M7 16h18" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="cl-topbar__name">CareLink</div>
      <div class="cl-topbar__tagline">Clinical Sanctuary</div>
    </div>
  </div>

  <!-- <div class="cl-topbar__search">
    <svg class="cl-topbar__search-icon" width="15" height="15" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="cl-topbar__search-input"
           placeholder="Search patients, appointments…">
  </div> -->

  <div class="cl-topbar__actions">

    <button type="button" class="cl-topbar__icon-btn" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="cl-topbar__notif-dot"></span>
    </button>

    <button type="button" class="cl-topbar__icon-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                 a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                 A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06
                 a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15
                 a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06
                 a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68
                 a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                 a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06
                 a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                 a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                 a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div class="cl-user-menu" [class.cl-user-menu--open]="menuOpen()">
      <button type="button" class="cl-topbar__user" (click)="toggleMenu()" aria-haspopup="menu" [attr.aria-expanded]="menuOpen()">
        <div class="avatar avatar-md avatar-primary">{{ userInitials() }}</div>
        <div class="cl-topbar__user-info">
          <span class="cl-topbar__user-name">{{ userName() }}</span>
          <span class="cl-topbar__user-role">{{ userRole() }}</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <div class="cl-user-menu__dropdown" *ngIf="menuOpen()" role="menu">
        <button type="button" class="cl-user-menu__item cl-user-menu__item--danger" role="menuitem" (click)="signOut()">
          Sign out
        </button>
      </div>
    </div>

  </div>
</header>
