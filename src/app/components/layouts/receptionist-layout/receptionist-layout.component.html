<div class="layout-shell">
  <app-navbar></app-navbar>

  <app-sidebar>

    <div class="cl-nav-section">Main</div>

    <a class="cl-nav-item" routerLink="/receptionist/dashboard" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      Dashboard
    </a>

    <div class="cl-nav-section">Queue</div>

    <a class="cl-nav-item" routerLink="/receptionist/queue" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </span>
      Today's Queue
      <span class="cl-nav-badge warning">14</span>
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/check-in" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </span>
      Check-In Patients
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/waiting-list" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </span>
      Waiting List
    </a>

    <div class="cl-nav-section">Appointments</div>

    <a class="cl-nav-item" routerLink="/receptionist/appointments" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      All Appointments
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/appointments/book" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span>
      New Appointment
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/appointments/reschedule" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.67"/>
        </svg>
      </span>
      Reschedule
    </a>

    <div class="cl-nav-section">Doctor Schedules</div>

    <a class="cl-nav-item" routerLink="/receptionist/schedule" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      Weekly Schedules
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/schedule/exceptions" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </span>
      Days Off / Exceptions
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/available-slots" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
      Available Slots
    </a>

    <div class="cl-nav-section">Patients</div>

    <a class="cl-nav-item" routerLink="/receptionist/patients" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      Patient Records
    </a>

    <a class="cl-nav-item" routerLink="/receptionist/patients/search" routerLinkActive="active">
      <span class="cl-nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      Search Patients
    </a>

  </app-sidebar>

  <div class="main-content">
    <div class="page-wrapper receptionist-layout__page">
      <router-outlet />
    </div>
  </div>

</div>
