{% block content %}
<div class="page-hero">
    <h1>Consultation</h1>
    <div class="patient-chip">
        👤 {{ appointment.patient.user.get_full_name }}
    </div>
</div>

<div class="content">
    <form method="POST" id="consultation-form">
        {% csrf_token %}
        <input type="hidden" name="appointment" value="{{ appointment.id }}">

        <div class="form-grid">
            <div class="form-card full-width">
                <h3>🩺 Diagnosis & Notes</h3>
                <label>Diagnosis</label>
                <input type="text" name="diagnosis" value="{{ consultation.diagnosis|default:'' }}" placeholder="Primary diagnosis...">
                <label>Clinical Notes</label>
                <textarea name="clinical_notes" placeholder="Detailed clinical notes...">{{ consultation.clinical_notes|default:'' }}</textarea>
            </div>

            <div class="form-card">
                <h3>💊 Prescriptions</h3>
                <div id="prescriptions-container">
                    {% if consultation %}
                        {% for rx in consultation.prescriptions.all %}
                        <div class="prescription-row">
                            <input type="text" name="drug_name[]" value="{{ rx.drug_name }}" placeholder="Drug name">
                            <input type="text" name="dose[]" value="{{ rx.dose }}" placeholder="Dose">
                            <input type="number" name="duration_days[]" value="{{ rx.duration_days }}" placeholder="Days">
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                        </div>
                        {% endfor %}
                    {% endif %}
                </div>
                <button type="button" class="btn-add" onclick="addPrescription()">+ Add Drug</button>
            </div>

            <div class="form-card">
                <h3>🔬 Requested Tests</h3>
                <div id="tests-container">
                    {% if consultation %}
                        {% for test in consultation.tests.all %}
                        <div style="display:flex; gap:0.75rem; margin-bottom:0.75rem;">
                            <input type="text" name="test_name[]" value="{{ test.test_name }}" placeholder="Test name" style="margin-bottom:0;">
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
                        </div>
                        {% endfor %}
                    {% endif %}
                </div>
                <button type="button" class="btn-add" onclick="addTest()">+ Add Test</button>
            </div>
        </div>

        <button type="submit" class="btn-primary">✓ Save & Complete Consultation</button>
    </form>
</div>

<script>
function addPrescription() {
    const container = document.getElementById('prescriptions-container');
    const row = document.createElement('div');
    row.className = 'prescription-row';
    row.innerHTML = `
        <input type="text" name="drug_name[]" placeholder="Drug name">
        <input type="text" name="dose[]" placeholder="Dose">
        <input type="number" name="duration_days[]" placeholder="Days">
        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
}

function addTest() {
    const container = document.getElementById('tests-container');
    const row = document.createElement('div');
    row.style = 'display:flex; gap:0.75rem; margin-bottom:0.75rem;';
    row.innerHTML = `
        <input type="text" name="test_name[]" placeholder="Test name" style="margin-bottom:0;">
        <button type="button" class="btn-remove" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
}
</script>
{% endblock %} -->
