<div class="container">
  <div class="card">
    <h2>Change Password</h2>

    <form (ngSubmit)="changePassword()" #form="ngForm">
      
      <!-- Old Password -->
      <div class="form-group">
        <label>Old Password</label>
        <input 
          type="password" 
          name="oldPassword"
          [(ngModel)]="formData.oldPassword"
          required
          placeholder="Enter your old password"
        />
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label>New Password</label>
        <input 
          type="password" 
          name="newPassword"
          [(ngModel)]="formData.newPassword"
          required
          placeholder="Enter new password"
        />
      </div>

      <!-- Repeat New Password -->
      <div class="form-group">
        <label>Confirm New Password</label>
        <input 
          type="password" 
          name="repeatNewPssword"
          [(ngModel)]="formData.repeatNewPssword"
          required
          placeholder="Repeat new password"
        />
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="form.invalid">
        Change Password
      </button>
      <div class="error" *ngIf="errorAPI">{{ errorAPI }}</div>

    </form>
    <button class="cancel-btn" routerLink="/auth/profile">Cancel</button>
  </div>
</div>
