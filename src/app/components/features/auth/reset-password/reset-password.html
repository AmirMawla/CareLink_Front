<div class="reset-page">
  <div class="reset-card">

    <div *ngIf="step === 1">
      <div class="reset-icon">🔒</div>
      <h2>Reset your password</h2>
      <p>Enter your email and we'll send you a reset link.</p>

      <div class="reset-field">
        <label>Email address</label>
        <input [(ngModel)]="email" type="email" placeholder="you@example.com">
      </div>

      <button class="reset-btn" (click)="requestReset()">Send reset link</button>
      <a class="reset-back" routerLink="/auth/login">← Back to login</a>
    </div>

    <div *ngIf="step === 2">
      <div class="reset-icon">🔑</div>
      <h2>Set new password</h2>
      <p>Enter your new password below.</p>

      <div class="reset-field">
        <label>New password</label>
        <input [(ngModel)]="newPassword" type="password" placeholder="New password">
      </div>

      <button class="reset-btn" (click)="confirmReset()">Reset password</button>
    </div>

  </div>
</div>
