<div class="signup-wrapper" dir="rtl">
  <div class="signup-card">
    <div class="signup-header">
      <h2>Create new account</h2>
      <p>enter your data </p>
    </div>

    <div *ngIf="messages.length > 0" class="alerts-container">
      <div *ngFor="let msg of messages" class="alert alert-info">
        {{ msg }}
      </div>
    </div>

    <form (ngSubmit)="signUp()">
      <div class="form-group full-width">
        <label for="role">Account type  *</label>
        <select id="role" name="role" [(ngModel)]="role" required class="role-select">
          <option value="" disabled selected>-- choose acoount type --</option>
          <option value="PATIENT"> Patient</option>
          <option value="DOCTOR"> Doctor</option>
          <option value="RECEPTIONIST"> Receptionist</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>first name  *</label>
          <input type="text" name="first_name" [(ngModel)]="first_name" placeholder="ex: mohamed ">
        </div>
        <div class="form-group">
          <label>last name  *</label>
          <input type="text" name="last_name" [(ngModel)]="last_name" placeholder="ex: elazzazy">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>username *</label>
          <input type="text" name="username" [(ngModel)]="username" placeholder="ex: ahmed_m">
        </div>
        <div class="form-group">
          <label>email  *</label>
          <input type="email" name="email" [(ngModel)]="email" placeholder="example@mail.com" dir="ltr">
        </div>
      </div>

      <div class="form-group full-width">
        <label>password  *</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="at least 8 characters">
      </div>

      <ng-container *ngIf="role === 'DOCTOR'">
        <div class="section-divider"><span>doctor data </span></div>
        
        <div class="form-row">
          <div class="form-group">
            <label>specialist *</label>
            <select name="specialty" [(ngModel)]="specialty">
              <option value="" disabled selected>--  choose speciality --</option>
              <option value="CARDIOLOGY"> Cardiology</option>
              <option value="DERMATOLOGY"> Dermatology</option>
              <option value="NEUROLOGY"> Neurology</option>
              <option value="PEDIATRICS"> Pediatrics</option>
              <option value="ORTHOPEDICS">Orthopedics</option>
              <option value="GENERAL">General</option>
            </select>
          </div>
          <div class="form-group">
            <label>session duration *</label>
            <select name="session_duration" [(ngModel)]="session_duration">
              <option value="-1" disabled selected>-- choose duration  --</option>
              <option [value]=15>15 minutes</option>
              <option [value]=30>30 minutes</option>
            </select>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Buffer Time *</label>
          <input type="number" name="buffer_time" [(ngModel)]="buffer_time" placeholder="ex: 5">
        </div>
      </ng-container>

      <ng-container *ngIf="role === 'PATIENT'">
        <div class="section-divider"><span>patient data </span></div>

        <div class="form-row">
          <div class="form-group">
            <label>birth date  *</label>
            <input type="date" name="date_of_birth" [(ngModel)]="date_of_birth">
          </div>
          <div class="form-group">
            <label>phone number *</label>
            <input type="text" name="phone_number" [(ngModel)]="phone_number" placeholder="ex: 01xxxxxxxxx">
          </div>
        </div>
        <div class="form-group full-width">
          <label> medical history (optional)</label>
          <textarea name="medical_history" [(ngModel)]="medical_history" rows="3" placeholder="..."></textarea>
        </div>
      </ng-container>

      <ng-container *ngIf="role === 'RECEPTIONIST'">
        <div class="section-divider"><span>receptionist data </span></div>

        <div class="form-group full-width">
          <label>doctor id *</label>
          <input type="number" name="doctor_id" [(ngModel)]="doctor_id" placeholder="">
        </div>
      </ng-container>

      <button type="submit" class="btn-primary">sign up</button>
    </form>
  </div>
</div>
